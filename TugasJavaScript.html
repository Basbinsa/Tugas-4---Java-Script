<!DOCTYPE html>
<html lang="id"></html>
<head>

    <title>Tugas - JavaScript DOM</title>

        .error { color: red; font-size: 0.8em; }

</head>
<body>

    <div id="step1" class="section">
        <table>
            <tr>

            </tr>
            <tr>
                <td>Jumlah Pilihan :</td>
                <td><input type="number" id="inputJml" min="1" placeholder="Jml"></td>
            </tr>
        </table>
        <button onclick="proses1()">OK</button>
    </div>

    <div id="step2" class="section hidden">
        <div id="containerPilihan"></div>
        <button onclick="proses2()">OK</button>
    </div>
    
</body>
